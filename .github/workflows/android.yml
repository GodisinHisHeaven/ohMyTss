name: Android Build & Test

on:
  push:
    branches: [main, James]
    paths:
      - 'onMyTssAndroid/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'onMyTssAndroid/**'
      - '.github/workflows/android.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x onMyTssAndroid/gradlew

      - name: Run unit tests
        working-directory: onMyTssAndroid
        run: ./gradlew test

      - name: Build debug APK
        working-directory: onMyTssAndroid
        run: ./gradlew assembleDebug

      - name: Build release AAB (compile-only, no signing)
        working-directory: onMyTssAndroid
        run: ./gradlew assembleRelease
        env:
          RELEASE_STORE_FILE: ""
          RELEASE_STORE_PASSWORD: ""
          RELEASE_KEY_ALIAS: ""
          RELEASE_KEY_PASSWORD: ""
