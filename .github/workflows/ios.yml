name: iOS Build & Test

on:
  push:
    branches: [main, James]
    paths:
      - 'onMyTss/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'onMyTss/**'
      - '.github/workflows/ios.yml'

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Create stub Secrets.xcconfig
        run: |
          cat > onMyTss/Config/Secrets.xcconfig <<'EOF'
          // Stub for CI builds — real values injected at runtime from env
          STRAVA_CLIENT_ID =
          STRAVA_CLIENT_SECRET =
          EOF

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Build
        run: |
          xcodebuild clean build \
            -scheme onMyTss \
            -project onMyTss/onMyTss.xcodeproj \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | \
            python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; \
            print(next(dev['udid'] for rt,devs in d.items() if 'iOS' in rt \
            for dev in devs if 'iPhone' in dev['name']))")
          echo "Using simulator: $DEVICE_ID"
          xcodebuild test \
            -scheme onMyTss \
            -project onMyTss/onMyTss.xcodeproj \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO
